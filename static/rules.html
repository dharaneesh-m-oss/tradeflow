<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulatory Updates | TradeFlow AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="bg-mesh">
        <div class="mesh-blob"
            style="top: -10%; left: -10%; background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%); width: 800px; height: 800px;">
        </div>
        <div class="mesh-blob"
            style="bottom: -10%; right: -10%; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); width: 600px; height: 600px;">
        </div>
    </div>

    <nav>
        <div class="logo">TRADEFLOW.AI</div>
        <div class="nav-links">
            <option value="fr">FR</option>
            <option value="de">DE</option>
            <option value="zh">ZH</option>
            <option value="ja">JA</option>
            <option value="ru">RU</option>
            <option value="pt">PT</option>
            <option value="ar">AR</option>
            </select>
        </div>
    </nav>

    <div class="rules-hero">
        <div class="container">
            <h1>Regulatory Intelligence</h1>
            <p>Real-time monitoring of global trade policy changes and customs regulations.</p>
        </div>
    </div>

    <div class="container">
        <div class="rules-grid" id="updatesTimeline">
            <!-- Dynamic Updates will be loaded here -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Syncing global databases...</p>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadRulesUpdates();
        });
    </script>
</body>

</html>

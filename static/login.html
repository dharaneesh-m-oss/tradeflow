<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TradeFlow AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="card login-card glass-form">
            <h1 class="logo">TRADEFLOW AI</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;" data-i18n="login_subtitle">Enter company details
                to access the portal</p>

            <form id="loginForm">
                <div class="form-group">
                    <label data-i18n="company_name">Company Name</label>
                    <input type="text" id="companyName" placeholder="e.g. Global Trade Corp" required>
                </div>
                <div class="form-group">
                    <label data-i18n="iec_number">Import/Export Code (IEC)</label>
                    <input type="text" id="iecNumber" placeholder="10 Digit IEC Number" required>
                </div>
                <div class="form-group">
                    <label data-i18n="company_address">Company Address</label>
                    <textarea id="companyAddress" placeholder="Full Registered Address" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Phone Number (with Country Code)</label>
                    <input type="tel" id="phoneNumber" placeholder="+919876543210" required>
                </div>


                <div id="otpSection" class="hidden">
                    <div class="form-group">
                        <label data-i18n="otp_label">Enter Verification Code</label>
                        <input type="text" id="otpValue" placeholder="6 Digit OTP">
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="primary-btn" data-i18n="get_otp">Get OTP</button>
            </form>

            <p id="loginStatus" style="margin-top: 20px; text-align: center; font-size: 14px;"></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const status = document.getElementById('loginStatus');
        let demoOtpSent = false;

        form.onsubmit = async (e) => {
            e.preventDefault();

            if (!demoOtpSent) {
                // Phase 1: Sending Demo OTP
                const phone = document.getElementById('phoneNumber').value;
                btn.disabled = true;
                btn.innerText = "Sending OTP...";

                // Mock delay
                await new Promise(r => setTimeout(r, 1000));

                document.getElementById('otpSection').classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Verify & Login";
                status.innerText = "Demo OTP sent to " + phone + " (Use: 123456)";
                status.style.color = "var(--primary)";
                demoOtpSent = true;
            } else {
                // Phase 2: Verifying Demo OTP
                const code = document.getElementById('otpValue').value;
                btn.disabled = true;
                btn.innerText = "Verifying...";

                await new Promise(r => setTimeout(r, 800));

                if (code === '123456') {
                    const profile = {
                        name: document.getElementById('companyName').value,
                        iec: document.getElementById('iecNumber').value,
                        address: document.getElementById('companyAddress').value,
                        phone: document.getElementById('phoneNumber').value,
                        uid: "demo-user-" + Date.now()
                    };
                    localStorage.setItem('tradeflow_profile', JSON.stringify(profile));
                    status.innerText = "Login Successful! Redirecting...";
                    status.style.color = "var(--success)";
                    setTimeout(() => window.location.href = '/app', 1000);
                } else {
                    status.innerText = "Invalid verification code. Use 123456";
                    status.style.color = "var(--danger)";
                    btn.disabled = false;
                    btn.innerText = "Verify & Login";
                }
            }
        };
    </script>
</body>

</html>
